{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
	<head>
    	<title>Jeff Jacobson</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<!-- Link preview tags -->
		<meta property="og:title" content="Jeff Jacobson blog and portfolio">
        <meta property="og:url" content="https://jeffjacobson.dev">
        <meta property="og:type" content="website">
        <meta property="og:image" content="{% static 'images/preview.png' %}">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">

		{% tailwind_css %}
		<!-- RSS feed -->
		<link rel="alternate" type="application/rss+xml" title="Jeff Jacobson blog" href="{% url 'feed' %}">
		<!-- Load htmx -->
        <script src="https://unpkg.com/htmx.org@2.0.6"></script>
		<!-- favicons -->
		<link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
		<link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
		<link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
		<link rel="manifest" href="{% static 'images/site.webmanifest' %}">
		<!-- Preload images -->
		<link rel="preload" href="{% static 'images/jazztunes.png' %}" as="image">
		<link rel="preload" href="{% static 'images/bellona.png' %}" as="image">
		<link rel="preload" href="{% static 'images/gfetch-site.png' %}" as="image">
		<link rel="preload" href="{% static 'images/gridlington.png' %}" as="image">
		<link rel="preload" href="{% static 'images/jobsearch.png' %}" as="image">
		<link rel="preload" href="{% static 'images/portfolio.png' %}" as="image">
		<link rel="preload" href="{% static 'images/with-diogenes.jpg' %}" as="image">
		<style>
			html {
				overflow-y: scroll;
			}
			.markdown-body pre {
				background-color: #f5f5f4;
				border: 1px solid #a8a29e;
				padding: 1rem;
				overflow-x: auto;
			}
			.markdown-body code {
				background-color: #f5f5f4;
				padding: 0.1rem 0.3rem;
			}
			.markdown-body pre code {
				background-color: transparent;
				padding: 0;
			}
		</style>
	</head>

	<body class="bg-fuchsia-900 font-serif leading-normal tracking-normal min-h-screen flex flex-col">
		<div class="flex-1 container mx-auto px-4 py-8">
			<nav class="bg-fuchsia-50 border border-stone-400 p-0 inline-flex overflow-hidden mb-3">
				<div
					data-tab="blog"
					hx-get="{% url 'blog' %}"
					hx-target="#tab-content"
					hx-swap="innerHTML"
					hx-trigger="click"
					hx-push-url="{% url 'blog' %}"
					class="flex-1 text-center text-stone-900 font-display flex items-center justify-center cursor-pointer hover:bg-amber-100 p-4 text-xl"
				>
					<span>Blog</span>
				</div>

				<div class="w-px bg-stone-400"></div>

				<div
					data-tab="projects"
					hx-get="{% url 'projects' %}"
					hx-target="#tab-content"
					hx-swap="innerHTML"
					hx-trigger="click"
					hx-push-url="{% url 'projects' %}"
					class="flex-1 text-center text-stone-900 font-display flex items-center justify-center cursor-pointer hover:bg-amber-100 p-4 text-xl"
				>
					<span>Projects</span>
				</div>

				<div class="w-px bg-stone-400"></div>

				<div
					data-tab="about"
					hx-get="{% url 'about' %}"
					hx-target="#tab-content"
					hx-swap="innerHTML"
					hx-trigger="click"
					hx-push-url="{% url 'about' %}"
					class="flex-1 text-center text-stone-900 font-display items-center justify-center cursor-pointer hover:bg-amber-100 p-4 text-xl"
				>
					<span>About</span>
				</div>
			</nav>

			<div id="tab-content" class="flex-1 mt-3">
				{% block content %}
				{% endblock %}
			</div>
		</div>

		<footer class="p-4 ml-8">
			<p class="text-xs text-stone-100">
				© 2026 Jeff Jacobson
			</p>
			<p class="text-xs text-stone-100">
				<a href="https://github.com/jwjacobson/portfolio/blob/main/LICENSE"
				class="text-fuchsia-300 hover:text-fuchsia-400" target="_blank" rel="noopener noreferrer">
				License
				</a>
				|<a
				href="https://github.com/jwjacobson/portfolio"
				class="text-fuchsia-300 hover:text-fuchsia-400" target="_blank" rel="noopener noreferrer">
				Source
				</a>
			</p>
			<p class="text-xs text-stone-100">
				Django | htmx | Tailwind
			</p>
		</footer>
	<script>
  function setActiveTab() {
    const path = window.location.pathname;
    document.querySelectorAll("[data-tab]").forEach(tab => {
      const section = tab.dataset.tab;
      const active =
        section === "blog"     ? (path === "/" || path.startsWith("/blog")) :
        section === "projects" ? path.startsWith("/projects") :
                                 path.startsWith("/about");
      tab.classList.toggle("bg-amber-100", active);
    });
  }
  document.addEventListener("DOMContentLoaded", setActiveTab);
  window.addEventListener("popstate", setActiveTab);
  document.body.addEventListener("htmx:pushedIntoHistory", setActiveTab);
</script>
	</body>
</html>
