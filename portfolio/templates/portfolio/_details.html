{% load static %}
<div id="tab-content">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div class="col-start-1 col-end-2 md:col-start-2 md:col-end-3 lg:col-start-2 lg:col-end-3">
      <div id="details-card" class="bg-[#ECEAE2] border border-[#3A3A3A] p-8">
        <h1 class="text-3xl font-bold text-center text-[#1E1E1E]">{{ project.title }}</h1>
        <h2 class="text-xl font-bold text-center mb-4 text-[#3A3A3A]"><em>{{ project.blurb }}</em></h2>
        <img
          src="{% static 'images/' %}{{ project.screenshot }}"
          alt="Screenshot of {{ project.title }}"
          class="w-full h-auto mb-6 border border-[#C4C2BA]"
        >
        <p class="text-[#3A3A3A] text-lg my-4">{{ project.description }}</p>
        <p class="text-lg text-[#3A3A3A] mb-2">
          <strong>Core Tech:</strong> {{ project.core_tech }}
        </p>
        <p class="text-lg text-[#3A3A3A] mb-2">
          <strong>Supporting Tech:</strong> {{ project.supporting_tech }}
        </p>

        <div class="flex justify-between mt-6">
        {% if project.title == "Portfolio" %}
        <button disabled class="bg-[#C4C2BA] text-[#888880] text-lg font-bold py-3 px-6 cursor-not-allowed">
          Visit Project
        </button>
        {% else %}
        <a href="{{ project.url }}" target="_blank">
          <button class="bg-[#4A6B40] hover:bg-[#7A9B6E] text-[#F7F6F2] text-lg font-bold py-3 px-6">
            Visit Project
          </button>
        </a>
        {% endif %}
        <button
          class="bg-transparent hover:bg-[#4A6B40] text-lg hover:text-[#F7F6F2] text-[#4A6B40] border border-[#4A6B40] font-bold py-3 px-6"
          hx-get="{% url 'index' %}"
          hx-target="#tab-content"
          hx-swap="innerHTML"
        >
          Back
        </button>
        </div>

      </div>
    </div>
  </div>
</div>
