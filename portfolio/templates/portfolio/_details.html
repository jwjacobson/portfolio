{% load static %}
<div id="tab-content">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div class="col-start-1 col-end-2 md:col-start-2 md:col-end-3 lg:col-start-2 lg:col-end-3">
      <div id="details-card" class="bg-orange-50 border border-stone-400 p-8">
        <h1 class="text-3xl font-bold text-center text-stone-900">{{ project.title }}</h1>
        <h2 class="text-xl font-bold text-center mb-4 text-stone-700"><em>{{ project.blurb }}</em></h2>
        <img
          src="{% static 'images/' %}{{ project.screenshot }}"
          alt="Screenshot of {{ project.title }}"
          class="w-full h-auto mb-6 border border-stone-400"
        >
        <p class="text-stone-700 text-lg my-4">{{ project.description }}</p>
        <p class="text-lg text-stone-700 mb-2">
          <strong>Core Tech:</strong> {{ project.core_tech }}
        </p>
        <p class="text-lg text-stone-neutral-700 mb-2">
          <strong>Supporting Tech:</strong> {{ project.supporting_tech }}
        </p>

        <div class="flex justify-between mt-6">
        {% if project.title == "Portfolio" %}
        <button disabled class="bg-stone-300 text-stone-400 text-lg font-bold py-3 px-6 cursor-not-allowed">
          Visit Project
        </button>
        {% else %}
        <a href="{{ project.url }}" target="_blank">
          <button class="bg-stone-600 hover:bg-fuchsia-700 text-stone-100 text-lg font-bold py-3 px-6">
            Visit Project
          </button>
        </a>
        {% endif %}
        <button
          class="bg-transparent hover:bg-fuchsia-700 text-lg hover:text-stone-100 text-stone-700 border border-stone-700 hover:border-orange-50 font-bold py-3 px-6"
          hx-get="{% url 'index' %}"
          hx-target="#tab-content"
          hx-swap="innerHTML"
        >
          Back
        </button>
        </div>

      </div>
    </div>
  </div>
</div>
