{% load markdown_extras %}
<div class="max-w-3xl">
    <div class="bg-amber-50 border border-stone-400 p-8">
        <h2 class="text-3xl font-bold text-stone-900 mb-1">{{ post.title }}</h2>
        <p class="text-sm text-stone-700 mb-4">{{ post.published_at|date:"F j, Y" }}</p>

        {% if post.tags.all %}
        <div class="flex flex-wrap gap-2 mb-6">
            {% for tag in post.tags.all %}
            <span
                class="bg-fuchsia-100 text-stone-700 border border-stone-400 hover:bg-stone-100 text-sm py-1 px-2 cursor-pointer"
                hx-get="{% url 'blog' %}?tag={{ tag.slug }}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                hx-push-url="{% url 'blog' %}?tag={{ tag.slug }}"
            >{{ tag.name }}</span>
            {% endfor %}
        </div>
        {% endif %}

        {% if post.image %}
        <img
            src="{{ post.image.url }}"
            alt="{{ post.image_alt }}"
            class="max-w-full max-h-screen w-auto mx-auto mb-6 border border-stone-400"
        >
        {% endif %}

        <div class="markdown-body max-w-prose text-stone-700 text-lg leading-relaxed">
            {{ post.body|markdown }}
        </div>

        <div class="mt-8">
            <button
                class="bg-transparent hover:bg-fuchsia-700 text-lg hover:text-stone-100 text-stone-700 border border-stone-700 hover:border-orange-50 font-bold py-3 px-6"
                hx-get="{% url 'blog' %}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                hx-push-url="{% url 'blog' %}"
            >
                Back
            </button>
        </div>
    </div>
</div>
